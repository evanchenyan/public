# ============================================
# 前端 CI 工作流
# 触发条件：frontend/ 目录变更
# 流程：检出 → npm 构建 → Kaniko 镜像打包推送
# ============================================
name: CI - Frontend

on:
  push:
    paths:
      - 'frontend/**'
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'frontend/**'
    branches:
      - main

env:
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
  REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
  REGISTRY_PASS: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------
      # Step 1: 检出代码
      # -------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------
      # Step 2: 设置 Node.js（带 npm 缓存）
      # -------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # -------------------------------------------
      # Step 3: npm 构建
      # -------------------------------------------
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # -------------------------------------------
      # Step 4: 用 Kaniko 构建并推送镜像
      # -------------------------------------------
      - name: Kaniko Build & Push
        run: |
          # 确定镜像标签
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.ref_name }}-${{ github.sha }}"
          fi

          chmod +x scripts/kaniko-build.sh
          scripts/kaniko-build.sh \
            frontend \
            frontend/Dockerfile \
            frontend \
            "${TAG}"

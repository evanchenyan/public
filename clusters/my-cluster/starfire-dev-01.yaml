apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-ns-starfire-dev-01
  namespace: flux-system
spec:
  interval: 3m0s # detect drift and undo kubectl edits every hour
  wait: false # wait for all applied resources to become ready
  timeout: 5m0s
  retryInterval: 3m0s
  prune: true # remove stale resources from cluster
  force: false # enable this to recreate resources on immutable fields changes
  targetNamespace: starfire-dev-01 # set the namespace for all resources
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/starfire-dev-01
---
# 更新定义自动扫描镜像仓库并更新最新镜像并提交git记录，以触发更新部署
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: image-update-apps-ns-starfire-dev-01
  namespace: flux-system
spec:
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@noreply.starfire.com
        name: fluxcdbot
      messageTemplate: |
        Automated image update
        Automation name: {{ .AutomationObject }}

        Files:
        {{ range $filename, $_ := .Changed.FileChanges -}}
        - {{ $filename }}
        {{ end -}}

        Objects:
        {{ range $resource, $changes := .Changed.Objects -}}
        - {{ $resource.Kind }} {{ $resource.Name }}
          Changes:
        {{- range $_, $change := $changes }}
            - {{ $change.OldValue }} -> {{ $change.NewValue }}
        {{ end -}}
        {{ end -}} 
    push:
      branch: main
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  update:
    path: ./apps/starfire-dev-01
    strategy: Setters
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-prometheus-stack-values
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    environment: production
    team: platform-sre
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: cloud-native-automation-platform
data:
  values.yaml: |
    nameOverride: ""
    namespaceOverride: ""
    kubeTargetVersionOverride: "monitoring"
    kubeVersionOverride: ""
    fullnameOverride: ""
    commonLabels:
      app: kube-prometheus-stack
      environment: production
      team: platform-sre
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/part-of: cloud-native-automation-platform
    crds:
      enabled: true
      upgradeJob:
        enabled: false
    customRules: {}
    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: true
        configReloaders: true
        general: true
        k8sContainerCpuUsageSecondsTotal: true
        k8sContainerMemoryCache: true
        k8sContainerMemoryRss: true
        k8sContainerMemorySwap: true
        k8sContainerResource: true
        k8sContainerMemoryWorkingSetBytes: true
        k8sPodOwner: true
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: true
        kubeApiserverHistogram: true
        kubeApiserverSlos: true
        kubeControllerManager: true
        kubelet: true
        kubeProxy: true
        kubePrometheusGeneral: true
        kubePrometheusNodeRecording: true
        kubernetesApps: true
        kubernetesResources: true
        kubernetesStorage: true
        kubernetesSystem: true
        kubeSchedulerAlerting: true
        kubeSchedulerRecording: true
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: true
        prometheusOperator: true
        windows: true
      appNamespacesOperator: "=~"
      appNamespacesTarget: ".*"
      keepFiringFor: ""
      labels: {}
      annotations: {}
      additionalRuleGroupLabels:
        alertmanager: {}
        etcd: {}
        configReloaders: {}
        general: {}
        k8sContainerCpuUsageSecondsTotal: {}
        k8sContainerMemoryCache: {}
        k8sContainerMemoryRss: {}
        k8sContainerMemorySwap: {}
        k8sContainerResource: {}
        k8sPodOwner: {}
        kubeApiserverAvailability: {}
        kubeApiserverBurnrate: {}
        kubeApiserverHistogram: {}
        kubeApiserverSlos: {}
        kubeControllerManager: {}
        kubelet: {}
        kubeProxy: {}
        kubePrometheusGeneral: {}
        kubePrometheusNodeRecording: {}
        kubernetesApps: {}
        kubernetesResources: {}
        kubernetesStorage: {}
        kubernetesSystem: {}
        kubeSchedulerAlerting: {}
        kubeSchedulerRecording: {}
        kubeStateMetrics: {}
        network: {}
        node: {}
        nodeExporterAlerting: {}
        nodeExporterRecording: {}
        prometheus: {}
        prometheusOperator: {}
      additionalRuleGroupAnnotations:
        alertmanager: {}
        etcd: {}
        configReloaders: {}
        general: {}
        k8sContainerCpuUsageSecondsTotal: {}
        k8sContainerMemoryCache: {}
        k8sContainerMemoryRss: {}
        k8sContainerMemorySwap: {}
        k8sContainerResource: {}
        k8sPodOwner: {}
        kubeApiserverAvailability: {}
        kubeApiserverBurnrate: {}
        kubeApiserverHistogram: {}
        kubeApiserverSlos: {}
        kubeControllerManager: {}
        kubelet: {}
        kubeProxy: {}
        kubePrometheusGeneral: {}
        kubePrometheusNodeRecording: {}
        kubernetesApps: {}
        kubernetesResources: {}
        kubernetesStorage: {}
        kubernetesSystem: {}
        kubeSchedulerAlerting: {}
        kubeSchedulerRecording: {}
        kubeStateMetrics: {}
        network: {}
        node: {}
        nodeExporterAlerting: {}
        nodeExporterRecording: {}
        prometheus: {}
        prometheusOperator: {}
      additionalAggregationLabels: []
      runbookUrl: "https://runbooks.prometheus-operator.dev/runbooks"
      kubeletServerCertificateExpiration:
        warning: 604800
        critical: 86400
      kubeletClientCertificateExpiration:
        warning: 604800
        critical: 86400
      node:
        fsSelector: 'fstype!=""'
      disabled: {}
    additionalPrometheusRulesMap: {}
    global:
      rbac:
        create: true
        createAggregateClusterRoles: false
      imageRegistry: ""
      imagePullSecrets: []
    windowsMonitoring:
      enabled: false
    prometheus-windows-exporter:
      prometheus:
        monitor:
          enabled: true
          jobLabel: jobLabel
      releaseLabel: true
      podLabels:
        jobLabel: windows-exporter
      config: |-
        collectors:
          enabled: '[defaults],memory,container'
    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
        inhibit_rules:
          - source_matchers:
              - 'severity = critical'
            target_matchers:
              - 'severity =~ warning|info'
            equal:
              - 'namespace'
              - 'alertname'
          - source_matchers:
              - 'severity = warning'
            target_matchers:
              - 'severity = info'
            equal:
              - 'namespace'
              - 'alertname'
          - source_matchers:
              - 'alertname = InfoInhibitor'
            target_matchers:
              - 'severity = info'
            equal:
              - 'namespace'
          - target_matchers:
              - 'alertname = InfoInhibitor'
        route:
          group_by: ['namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'null'
          routes:
          - receiver: 'null'
            matchers:
              - alertname = "Watchdog"
        receivers:
        - name: 'null'
        templates:
        - '/etc/alertmanager/config/*.tmpl'
      service:
        enabled: true
        type: ClusterIP
        port: 9093
        targetPort: 9093
        nodePort: 30903
      alertmanagerSpec:
        image:
          registry: quay.io
          repository: prometheus/alertmanager
          tag: v0.32.2
          pullPolicy: IfNotPresent
        replicas: 2
        retention: 7d
        logFormat: logfmt
        logLevel: info
        podAntiAffinity: "soft"
        podAntiAffinityTopologyKey: kubernetes.io/hostname
        securityContext:
          runAsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 2000
          seccompProfile:
            type: RuntimeDefault
    grafana:
      enabled: true
      defaultDashboardsEnabled: true
      adminUser: admin
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
        datasources:
          enabled: true
          defaultDatasourceEnabled: true
          isDefaultDatasource: true
          name: Prometheus
          uid: prometheus
          httpMethod: POST
          createPrometheusReplicasDatasources: false
          prometheusServiceName: prometheus-operated
      serviceMonitor:
        enabled: true
    kubernetesServiceMonitors:
      enabled: true
    kubeApiServer:
      enabled: true
      tlsConfig:
        serverName: kubernetes
        insecureSkipVerify: false
      serviceMonitor:
        enabled: true
        jobLabel: component
        selector:
          matchLabels:
            component: apiserver
            provider: kubernetes
        metricRelabelings:
          - action: drop
            regex: (etcd_request|apiserver_request_slo|apiserver_request_sli|apiserver_request)_duration_seconds_bucket;(0\.15|0\.2|0\.3|0\.35|0\.4|0\.45|0\.6|0\.7|0\.8|0\.9|1\.25|1\.5|1\.75|2|3|3\.5|4|4\.5|6|7|8|9|15|20|40|45|50)(\.0)?
            sourceLabels:
              - __name__
              - le
    kubelet:
      enabled: true
      namespace: kube-system
      serviceMonitor:
        enabled: true
        kubelet: true
        honorLabels: true
        honorTimestamps: true
        trackTimestampsStaleness: true
        https: true
        insecureSkipVerify: true
        probes: true
        cAdvisor: true
        cAdvisorInterval: 10s
    kubeControllerManager:
      enabled: true
      service:
        enabled: true
    coreDns:
      enabled: true
      service:
        enabled: true
        port: 9153
        targetPort: 9153
      serviceMonitor:
        enabled: true
        bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubeDns:
      enabled: false
    kubeEtcd:
      enabled: true
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      serviceMonitor:
        enabled: true
        scheme: http
        insecureSkipVerify: false
        bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubeScheduler:
      enabled: true
      service:
        enabled: true
    kubeProxy:
      enabled: true
      service:
        enabled: true
        port: 10249
        targetPort: 10249
      serviceMonitor:
        enabled: true
    kubeStateMetrics:
      enabled: true
    kube-state-metrics:
      releaseLabel: true
      prometheusScrape: false
      prometheus:
        monitor:
          enabled: true
          http:
            honorLabels: true
          metrics:
            honorLabels: true
    nodeExporter:
      enabled: true
      operatingSystems:
        linux:
          enabled: true
        aix:
          enabled: true
        darwin:
          enabled: true
    prometheus-node-exporter:
      podLabels:
        jobLabel: node-exporter
      releaseLabel: true
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/containerd/.+|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
        - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|erofs)$
      service:
        portName: http-metrics
        labels:
          jobLabel: node-exporter
      image:
        distroless: true
      prometheus:
        monitor:
          enabled: true
          jobLabel: jobLabel
    prometheusOperator:
      enabled: true
      revisionHistoryLimit: 10
      tls:
        enabled: true
        tlsMinVersion: VersionTLS13
        internalPort: 10250
      service:
        nodePort: 30080
        nodePortTls: 30443
      podDisruptionBudget:
        enabled: false
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      image:
        registry: quay.io
        repository: prometheus-operator/prometheus-operator
        pullPolicy: IfNotPresent
    prometheus:
      enabled: true
      agentMode: false
      service:
        enabled: true
        type: ClusterIP
        port: 9090
        targetPort: 9090
        nodePort: 30090
      serviceMonitor:
        selfMonitor: true
      prometheusSpec:
        replicas: 2
        retention: 7d
        walCompression: true
        logLevel: info
        logFormat: logfmt
        podAntiAffinity: "soft"
        podAntiAffinityTopologyKey: kubernetes.io/hostname
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: "cbs"
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 60Gi
        securityContext:
          runAsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 2000
          seccompProfile:
            type: RuntimeDefault
        image:
          registry: quay.io
          repository: prometheus/prometheus
          tag: v3.12.0-distroless
          pullPolicy: IfNotPresent
    thanosRuler:
      enabled: false

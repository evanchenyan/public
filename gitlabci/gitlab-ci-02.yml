# .gitlab-ci.yml
# =============================================================================
# GitLab CI/CD Pipeline: build image -> push to registry
#
# Configure the following in GitLab Settings > CI/CD > Variables:
#   - IMAGE_REGISTRY     : registry host (e.g. harbor.example.com)
#   - REGISTRY_USER      : registry username
#   - REGISTRY_PASSWORD  : registry password/token
#   - KANIKO_VERBOSITY   : (optional) kaniko log level, default: info
#
# Configure the following in .ci-config at project root:
#   - IMAGE_NAMESPACE_PROD : namespace for main/master/prod branches
#   - IMAGE_NAMESPACE_QA   : namespace for all other branches
#
# Example .ci-config:
#   IMAGE_NAMESPACE_PROD=prod-starfire
#   IMAGE_NAMESPACE_QA=starfire-qa
# =============================================================================

# ==================== pipeline-level branch filter ====================
# Only the following branches trigger a pipeline:
#   dev-* / test-* / stg-* / uat-* / prod-* / master / main / develop
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(dev|test|stg|uat|prod)-.+$/'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - when: never

stages:
  - build-and-push
  - report

variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:debug"
  DOCKERFILE_PATH: "Dockerfile"
  CONTEXT_DIR: "."
  KANIKO_VERBOSITY: "info"
  MAVEN_REPO_LOCAL: "-Dmaven.repo.local=.m2/repository"
  GRADLE_USER_HOME: "/home/gradle/.gradle"
  GOPROXY: "https://proxy.golang.org,direct"

# ==================== stage 1: build ====================

build-go:
  stage: build-and-push
  image:
    name: ${KANIKO_IMAGE}
    entrypoint: [""]
  script:
    - |
      if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
        echo "ERROR: missing REGISTRY_USER or REGISTRY_PASSWORD"
        exit 1
      fi
      if [ ! -f ".ci-config" ]; then
        echo "ERROR: .ci-config not found"
        exit 1
      fi
      . ./.ci-config
      case "${CI_COMMIT_REF_NAME}" in
        main|master|prod) IMAGE_NAMESPACE="${IMAGE_NAMESPACE_PROD}" ;;
        *)                IMAGE_NAMESPACE="${IMAGE_NAMESPACE_QA}" ;;
      esac
      IMAGE_NAME="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}"
      IMAGE_TAG="$(date -u '+%y.%m.%d%H%M')-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_REF_SLUG}.gitlabci"
      echo "namespace=${IMAGE_NAMESPACE} image=${IMAGE_NAME}:${IMAGE_TAG}"
      mkdir -p /kaniko/.docker
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}' \
        "${IMAGE_REGISTRY}" "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" \
        > /kaniko/.docker/config.json
      GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
      MODULE_NAME=$(grep '^module ' go.mod | awk '{print $2}')
      echo "go_version=${GO_VERSION} module=${MODULE_NAME}"
      BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S_UTC')
      GIT_VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      /kaniko/executor \
        --context="${CONTEXT_DIR}" \
        --dockerfile="${DOCKERFILE_PATH}" \
        --destination="${IMAGE_NAME}:${IMAGE_TAG}" \
        --cache=true \
        --cache-repo="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}/cache" \
        --build-arg="GOPROXY=${GOPROXY}" \
        --build-arg="BUILD_TIME=${BUILD_TIME}" \
        --build-arg="GIT_COMMIT=${CI_COMMIT_SHORT_SHA}" \
        --build-arg="GIT_VERSION=${GIT_VERSION}" \
        --verbosity="${KANIKO_VERBOSITY}" \
        --cleanup
  rules:
    - exists:
        - pom.xml
      when: never
    - exists:
        - build.gradle
      when: never
    - exists:
        - build.gradle.kts
      when: never
    - exists:
        - go.mod
        - Dockerfile
  tags:
    - docker

build-java-maven:
  stage: build-and-push
  image:
    name: ${KANIKO_IMAGE}
    entrypoint: [""]
  script:
    - |
      if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
        echo "ERROR: missing REGISTRY_USER or REGISTRY_PASSWORD"
        exit 1
      fi
      if [ ! -f ".ci-config" ]; then
        echo "ERROR: .ci-config not found"
        exit 1
      fi
      . ./.ci-config
      case "${CI_COMMIT_REF_NAME}" in
        main|master|prod) IMAGE_NAMESPACE="${IMAGE_NAMESPACE_PROD}" ;;
        *)                IMAGE_NAMESPACE="${IMAGE_NAMESPACE_QA}" ;;
      esac
      IMAGE_NAME="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}"
      IMAGE_TAG="$(date -u '+%y.%m.%d%H%M')-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_REF_SLUG}.gitlabci"
      echo "namespace=${IMAGE_NAMESPACE} image=${IMAGE_NAME}:${IMAGE_TAG}"
      mkdir -p /kaniko/.docker
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}' \
        "${IMAGE_REGISTRY}" "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" \
        > /kaniko/.docker/config.json
      grep -E "<groupId>|<artifactId>|<version>" pom.xml | head -5 || true
      /kaniko/executor \
        --context="${CONTEXT_DIR}" \
        --dockerfile="${DOCKERFILE_PATH}" \
        --destination="${IMAGE_NAME}:${IMAGE_TAG}" \
        --cache=true \
        --cache-repo="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}/cache" \
        --build-arg="MAVEN_OPTS=${MAVEN_REPO_LOCAL}" \
        --verbosity="${KANIKO_VERBOSITY}" \
        --cleanup
  rules:
    - exists:
        - go.mod
      when: never
    - exists:
        - build.gradle
      when: never
    - exists:
        - build.gradle.kts
      when: never
    - exists:
        - pom.xml
        - Dockerfile
  tags:
    - docker

build-java-gradle:
  stage: build-and-push
  image:
    name: ${KANIKO_IMAGE}
    entrypoint: [""]
  script:
    - |
      if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
        echo "ERROR: missing REGISTRY_USER or REGISTRY_PASSWORD"
        exit 1
      fi
      if [ ! -f ".ci-config" ]; then
        echo "ERROR: .ci-config not found"
        exit 1
      fi
      . ./.ci-config
      case "${CI_COMMIT_REF_NAME}" in
        main|master|prod) IMAGE_NAMESPACE="${IMAGE_NAMESPACE_PROD}" ;;
        *)                IMAGE_NAMESPACE="${IMAGE_NAMESPACE_QA}" ;;
      esac
      IMAGE_NAME="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}"
      IMAGE_TAG="$(date -u '+%y.%m.%d%H%M')-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_REF_SLUG}.gitlabci"
      echo "namespace=${IMAGE_NAMESPACE} image=${IMAGE_NAME}:${IMAGE_TAG}"
      mkdir -p /kaniko/.docker
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}' \
        "${IMAGE_REGISTRY}" "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" \
        > /kaniko/.docker/config.json
      head -20 build.gradle 2>/dev/null || head -20 build.gradle.kts 2>/dev/null || true
      /kaniko/executor \
        --context="${CONTEXT_DIR}" \
        --dockerfile="${DOCKERFILE_PATH}" \
        --destination="${IMAGE_NAME}:${IMAGE_TAG}" \
        --cache=true \
        --cache-repo="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}/cache" \
        --build-arg="GRADLE_USER_HOME=${GRADLE_USER_HOME}" \
        --verbosity="${KANIKO_VERBOSITY}" \
        --cleanup
  rules:
    - exists:
        - go.mod
      when: never
    - exists:
        - pom.xml
      when: never
    - exists:
        - build.gradle
        - Dockerfile
    - exists:
        - build.gradle.kts
        - Dockerfile
  tags:
    - docker

build-docker:
  stage: build-and-push
  image:
    name: ${KANIKO_IMAGE}
    entrypoint: [""]
  script:
    - |
      if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
        echo "ERROR: missing REGISTRY_USER or REGISTRY_PASSWORD"
        exit 1
      fi
      if [ ! -f ".ci-config" ]; then
        echo "ERROR: .ci-config not found"
        exit 1
      fi
      . ./.ci-config
      case "${CI_COMMIT_REF_NAME}" in
        main|master|prod) IMAGE_NAMESPACE="${IMAGE_NAMESPACE_PROD}" ;;
        *)                IMAGE_NAMESPACE="${IMAGE_NAMESPACE_QA}" ;;
      esac
      IMAGE_NAME="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}"
      IMAGE_TAG="$(date -u '+%y.%m.%d%H%M')-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_REF_SLUG}.gitlabci"
      echo "namespace=${IMAGE_NAMESPACE} image=${IMAGE_NAME}:${IMAGE_TAG}"
      mkdir -p /kaniko/.docker
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}' \
        "${IMAGE_REGISTRY}" "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" \
        > /kaniko/.docker/config.json
      /kaniko/executor \
        --context="${CONTEXT_DIR}" \
        --dockerfile="${DOCKERFILE_PATH}" \
        --destination="${IMAGE_NAME}:${IMAGE_TAG}" \
        --cache=true \
        --cache-repo="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}/cache" \
        --verbosity="${KANIKO_VERBOSITY}" \
        --cleanup
  rules:
    - exists:
        - go.mod
      when: never
    - exists:
        - pom.xml
      when: never
    - exists:
        - build.gradle
      when: never
    - exists:
        - build.gradle.kts
      when: never
    - exists:
        - Dockerfile
  tags:
    - docker

# ==================== stage 2: report ====================

report:
  stage: report
  image: alpine:latest
  script:
    - |
      if [ -f ".ci-config" ]; then
        . ./.ci-config
        case "${CI_COMMIT_REF_NAME}" in
          main|master|prod) IMAGE_NAMESPACE="${IMAGE_NAMESPACE_PROD}" ;;
          *)                IMAGE_NAMESPACE="${IMAGE_NAMESPACE_QA}" ;;
        esac
      fi
      IMAGE_TAG="$(date -u '+%y.%m.%d%H%M')-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_REF_SLUG}.gitlabci"
      echo "project=${CI_PROJECT_NAME}"
      echo "branch=${CI_COMMIT_REF_NAME}"
      echo "namespace=${IMAGE_NAMESPACE}"
      echo "image=${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${CI_PROJECT_NAME}:${IMAGE_TAG}"
      echo "done at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
  needs:
    - job: build-go
      optional: true
    - job: build-java-maven
      optional: true
    - job: build-java-gradle
      optional: true
    - job: build-docker
      optional: true
  tags:
    - docker

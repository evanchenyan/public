apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "58.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: kube-prometheus-stack-values
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-prometheus-stack-values
  namespace: monitoring
data:
  values.yaml: |
    fullnameOverride: prometheus

    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['alertname', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'null'
          routes:
            - matchers:
                - alertname = "Watchdog"
              receiver: 'null'
        receivers:
          - name: 'null'
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi

    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: "40GB"
        scrapeInterval: 30s
        evaluationInterval: 30s
        # 自动发现所有命名空间的 ServiceMonitor / PodMonitor
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi

    # 主机监控
    nodeExporter:
      enabled: true

    # K8s 资源状态监控（Pod / Deployment / Node 等）
    kubeStateMetrics:
      enabled: true

    kube-state-metrics:
      metricLabelsAllowlist:
        - pods=[app,version,tier]
        - deployments=[app,version]
        - nodes=[kubernetes.io/hostname,topology.kubernetes.io/zone]

    # 内置告警规则
    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: true
        configReloaders: true
        general: true
        k8s: true
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: true
        kubeApiserverHistogram: true
        kubeApiserverSlos: true
        kubeControllerManager: true
        kubelet: true
        kubeProxy: true
        kubePrometheusGeneral: true
        kubePrometheusNodeRecording: true
        kubernetesApps: true       # Pod CrashLoopBackOff / OOMKilled 等
        kubernetesResources: true  # 资源配额告警
        kubernetesStorage: true
        kubernetesSystem: true
        kubeSchedulerAlerting: true
        kubeSchedulerRecording: true
        kubeStateMetrics: true
        network: true
        node: true                 # 节点 CPU / 内存 / 磁盘告警
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: true

    grafana:
      enabled: false  # Grafana 单独部署，保持关注点分离

apiVersion: v1
kind: ConfigMap
metadata:
  name: node-table-simple
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  node-table-simple.json: |
    {
      "title": "Node Overview",
      "tags": ["node", "overview"],
      "panels": [
        {
          "id": 2,
          "title": "Node Metrics",
          "type": "table",
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {
              "expr": "sum by (instance) (node_memory_MemTotal_bytes)",
              "format": "table",
              "instant": true,
              "refId": "A"
            },
            {
              "expr": "100 * (1 - avg by (instance) (node_memory_MemAvailable_bytes) / avg by (instance) (node_memory_MemTotal_bytes))",
              "format": "table",
              "instant": true,
              "refId": "B"
            },
            {
              "expr": "100 * (sum by (instance) (rate(node_cpu_seconds_total{mode!=\"idle\"}[2m])) / count by (instance) (node_cpu_seconds_total{mode=\"system\"}))",
              "format": "table",
              "instant": true,
              "refId": "C"
            },
            {
              "expr": "100 * (1 - avg by (instance) (node_filesystem_free_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"}) / avg by (instance) (node_filesystem_size_bytes{fstype!=\"tmpfs\",mountpoint=\"/\"}))",
              "format": "table",
              "instant": true,
              "refId": "D"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "instance": "Node",
                  "Value #A": "Memory Total",
                  "Value #B": "Memory Usage %",
                  "Value #C": "CPU Usage %",
                  "Value #D": "Disk Usage %"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 85}
                ]
              },
              "unit": "percentunit",
              "decimals": 1
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Node"},
                "properties": [{"id": "unit"}]
              },
              {
                "matcher": {"id": "byName", "options": "Memory Total"},
                "properties": [{"id": "unit", "value": "bytes"}]
              }
            ]
          }
        }
      ]
    }

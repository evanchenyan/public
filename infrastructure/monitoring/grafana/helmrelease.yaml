apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      version: "7.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 10m
  values:
    adminUser: admin
    adminPassword: "changeme"  # 生产环境请替换为 secretKeyRef

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-prometheus.monitoring.svc.cluster.local:9090
            isDefault: true
            editable: false

    # 预装看板
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            folder: K8s
            type: file
            disableDeletion: false
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        # K8s 集群整体概览
        k8s-cluster:
          gnetId: 15520
          revision: 1
          datasource: Prometheus
        # Node 主机监控
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource: Prometheus
        # Pod / Deployment 状态
        k8s-workloads:
          gnetId: 15521
          revision: 1
          datasource: Prometheus
        # 命名空间维度
        k8s-namespace:
          gnetId: 15758
          revision: 1
          datasource: Prometheus

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false  # 按需开启，配置 host

    persistence:
      enabled: true
      size: 5Gi
      accessModes:
        - ReadWriteOnce

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/"
      auth.anonymous:
        enabled: false
      analytics:
        reporting_enabled: false
        check_for_updates: false

admin:
  user: admin
  password: "changeme"

datasources:
  secretDefinition:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false

dashboardsProvider:
  enabled: true

dashboardsConfigMaps:
  - configMapName: grafana-dashboards
    fileName: dashboards.yaml

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  size: 5Gi
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

grafana:
  analytics:
    reporting_enabled: "false"
    check_for_updates: "false"

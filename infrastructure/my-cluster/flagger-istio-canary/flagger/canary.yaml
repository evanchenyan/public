apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: my-app
  namespace: test
spec:
  # 目标 Deployment（Flagger 将监控其镜像变更）
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-app

  # 应用 Service（Flagger 会创建 primary 和 canary 两个 Service）
  service:
    port: 80
    targetPort: 8080
    name: my-app
    portName: http

  # 集成 Istio 流量路由
  serviceMeshProvider: istio

  # 灰度发布策略配置
  analysis:
    # 指标检查频率
    schedule: "every 60s"

    # 最大失败次数（超过则自动回滚）
    threshold: 5

    # 每次放量增加的百分比
    stepWeight: 10

    # 最大放量百分比
    maxWeight: 50

    # 灰度验证指标
    metrics:
    # 1. 请求成功率（5xx 错误率 <= 1%）
    - name: request-success-rate
      templateRef:
        name: success-rate
      thresholdRange:
        min: 99
      interval: 1m

    # 2. 请求延迟（P99 < 500ms）
    - name: request-duration
      templateRef:
        name: latency
      thresholdRange:
        max: 500
      interval: 30s

    # 灰度后置检查（Webhook 集成测试）
    webhooks:
    # 启动负载测试
    - name: load-test
      url: http://flagger-loadtester.test/
      timeout: 5s
      metadata:
        type: cmd
        cmd: "hey -z 30s -q 10 -c 2 http://my-app-canary.test:80/"
---
# 指标模板：请求成功率
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: success-rate
  namespace: test
spec:
  provider:
    type: prometheus
    address: http://prometheus-operated.test:9090
  query: |
    sum(
      rate(
        istio_requests_total{
          reporter="destination",
          destination_service_namespace="test",
          destination_service_name="my-app",
          response_code!~"5.*"
        }[{{ interval }}]
      )
    )
    /
    sum(
      rate(
        istio_requests_total{
          reporter="destination",
          destination_service_namespace="test",
          destination_service_name="my-app"
        }[{{ interval }}]
      )
    )
    * 100
---
# 指标模板：请求延迟（P99）
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: latency
  namespace: test
spec:
  provider:
    type: prometheus
    address: http://prometheus-operated.test:9090
  query: |
    histogram_quantile(
      0.99,
      sum(
        rate(
          istio_request_duration_milliseconds_bucket{
            reporter="destination",
            destination_service_namespace="test",
            destination_service_name="my-app"
          }[{{ interval }}]
        )
      ) by (le)
    )
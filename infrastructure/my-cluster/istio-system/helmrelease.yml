apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-operator
  namespace: istio-system
spec:
  interval: 12h
  releaseName: istio-operator
  chartRef:
    kind: OCIRepository
    name: istio
  values:
    operator:
      nodeSelector:
        kubernetes.io/os: linux
    # Use demo profile for testing (includes all features)
    # Change to 'default' for production
    profile: demo

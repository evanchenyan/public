apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: base-gateway
spec:
  releaseName: base-gateway
  chart:
    spec:
      chart: heytea-template-app
      sourceRef:
        kind: HelmRepository
        name: heytea-helm-charts-public
        namespace: flux-system
      version: "2.1.0"
  interval: 1h0m0s
  timeout: 15m0s
  install:
    disableWait: true
    remediation:
      retries: 15
  upgrade:
    disableWait: true
    remediation:
      retries: 15
  values:
    fluxcdImageUpdate:
      enabled: false
      fluxcdNamespace: flux-system
  valuesFrom:
    - kind: Secret
      name: values-base-gateway

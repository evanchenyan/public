apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cloud-platfrom-backend
spec:
  releaseName: cloud-platfrom-backend
  chart:
    spec:
      chart: template-app
      sourceRef:
        kind: HelmRepository
        name: repo
        namespace: flux-system
      version: "0.1.14"
  interval: 1h0m0s
  timeout: 15m0s
  install:
    disableWait: true
    remediation:
      retries: 15
  upgrade:
    disableWait: true
    remediation:
      retries: 15
  values:
    fluxcdImageUpdate:
      enabled: false
      fluxcdNamespace: flux-system
  valuesFrom:
    - kind: Secret
      name: values-cloud-platfrom-backend

apiVersion: v1
kind: Service
metadata:
  name: {{ include "templateApps.fullname" . }}
  labels:
    {{- include "templateApps.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "templateApps.selectorLabels" . | nindent 4 }}
